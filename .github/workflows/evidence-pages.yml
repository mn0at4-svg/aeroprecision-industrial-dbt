name: Deploy Evidence to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - ".github/workflows/evidence-pages.yml"
  workflow_dispatch:
  schedule:
    # Every Monday at 06:17 JST (Sunday 21:17 UTC)
    - cron: "17 21 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

jobs:
  build:
    name: Build Evidence dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: aeroprecision-data-pipeline
          workload_identity_provider: projects/85924451193/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: dbt-bigquery-runner@aeroprecision-data-pipeline.iam.gserviceaccount.com

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Install dbt dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          dbt --version

      - name: Create production dbt profile
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          mkdir -p "$DBT_PROFILES_DIR"
          cat > "$DBT_PROFILES_DIR/profiles.yml" <<'EOF'
          aeroprecision_industrial:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: aeroprecision-data-pipeline
                dataset: analytics_manufacturing
                location: US
                threads: 4
                job_execution_timeout_seconds: 300
          EOF

      - name: Restore and refresh Raw tables
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./operations/restore_raw.ps1 -Execute -ConfirmProductionReplace

      - name: Validate production BigQuery connection
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: dbt debug --target prod

      - name: Rebuild and test production models
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: dbt build --full-refresh --target prod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: reports/package-lock.json

      - name: Install Evidence dependencies
        working-directory: reports
        run: npm ci

      - name: Load BigQuery data
        working-directory: reports
        run: npm run sources

      - name: Build Evidence site
        working-directory: reports
        env:
          BASE_PATH: /aeroprecision-industrial-dbt
          EVIDENCE_BUILD_DIR: ./build/aeroprecision-industrial-dbt
        run: npm run build:strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/build/aeroprecision-industrial-dbt

  deploy:
    name: Deploy Evidence dashboard
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4