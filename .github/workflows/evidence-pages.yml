name: Deploy Evidence to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - ".github/workflows/evidence-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Evidence dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: reports/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: aeroprecision-data-pipeline
          workload_identity_provider: projects/85924451193/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: dbt-bigquery-runner@aeroprecision-data-pipeline.iam.gserviceaccount.com

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Install Evidence dependencies
        working-directory: reports
        run: npm ci

      - name: Load BigQuery data
        working-directory: reports
        run: npm run sources

      - name: Build Evidence site
        working-directory: reports
        env:
          BASE_PATH: /aeroprecision-industrial-dbt
          EVIDENCE_BUILD_DIR: ./build/aeroprecision-industrial-dbt
        run: npm run build:strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/build/aeroprecision-industrial-dbt

  deploy:
    name: Deploy Evidence dashboard
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4