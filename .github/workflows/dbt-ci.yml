name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

jobs:
  dbt-build:
    name: Build and test dbt project
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: aeroprecision-data-pipeline
          workload_identity_provider: projects/85924451193/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: dbt-bigquery-runner@aeroprecision-data-pipeline.iam.gserviceaccount.com

      - name: Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          dbt --version

      - name: Create CI dbt profile
        shell: bash
        run: |
          mkdir -p "$DBT_PROFILES_DIR"
          cat > "$DBT_PROFILES_DIR/profiles.yml" <<'EOF'
          aeroprecision_industrial:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: aeroprecision-data-pipeline
                dataset: analytics_manufacturing_ci
                location: US
                threads: 4
                job_execution_timeout_seconds: 300
          EOF

      - name: Validate BigQuery connection
        run: dbt debug --target ci

      - name: Build and test dbt project
        run: dbt build --full-refresh --target ci