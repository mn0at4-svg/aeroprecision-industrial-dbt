appearance:
  default: dark
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#0f4c81"
        - "#0891b2"
        - "#0f766e"
        - "#d97706"
        - "#dc2626"
        - "#7c3aed"
      dark:
        - "#38bdf8"
        - "#22d3ee"
        - "#2dd4bf"
        - "#fbbf24"
        - "#fb7185"
        - "#a78bfa"

  colorScales:
    default:
      light:
        - "#dbeafe"
        - "#0f4c81"
      dark:
        - "#164e63"
        - "#38bdf8"

  colors:
    primary:
      light: "#0f4c81"
      dark: "#38bdf8"
    accent:
      light: "#b45309"
      dark: "#fbbf24"
    base:
      light: "#f8fafc"
      dark: "#08111f"
    info:
      light: "#0369a1"
      dark: "#38bdf8"
    positive:
      light: "#047857"
      dark: "#34d399"
    warning:
      light: "#b45309"
      dark: "#fbbf24"
    negative:
      light: "#b91c1c"
      dark: "#fb7185"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages.
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
